# Replaceable plants configuration
# Plants listed here are removed when snow is placed and restored when snow melts.
#
# replaceable: Single-block plants or the bottom half of two-block plants.
#              These are safely removed by setting the block to AIR.
# double_plants: Two-block-high plants. Both halves are removed when snow is placed,
#                and the bottom half is restored when snow melts (top half regrows).
#
# New Minecraft plants can be added without code changes.

